name: Release

# Publishes the `bwoc-setup` wizard binary for every supported platform on a
# version tag, so the bootstrap scripts (scripts/install.sh / install.ps1) can
# download and launch it automatically.
#
# Maintainers push a SemVer tag manually:
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Each build produces  bwoc-setup-<tag>-<target>.{tar.gz,zip}  plus a matching
# .sha256 sidecar — the exact asset names the install scripts look for.
#
# Binaries are unsigned, distributed with SHA-256 checksums.
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write # create / upload to the GitHub Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Create the release shell once so parallel matrix builds only append assets
  # (avoids the "already_exists" race when each job tries to create it).
  create-release:
    name: create release shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create empty release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"

  build:
    name: build ${{ matrix.target }} (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tag="${GITHUB_REF##refs/tags/}"
          name="bwoc-setup-${tag}-${{ matrix.target }}"
          mkdir "$name"
          cp target/${{ matrix.target }}/release/bwoc-setup "$name/"
          cp README.md LICENSE                              "$name/" 2>/dev/null || true
          tar -czf "dist/${name}.tar.gz" "$name"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF}" -replace '^refs/tags/', ''
          $name = "bwoc-setup-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bwoc-setup.exe" -Destination "$name/"
          Copy-Item README.md, LICENSE -Destination "$name/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$name" -DestinationPath "dist/$name.zip"
          $h = (Get-FileHash -Algorithm SHA256 "dist/$name.zip").Hash.ToLower()
          "$h  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload assets to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          gh release upload "$tag" dist/* --clobber --repo "$GITHUB_REPOSITORY"
